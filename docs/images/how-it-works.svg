<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 375" font-family="monospace" font-size="13">
  <defs>
    <marker id="arr-a" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7" fill="#4a9eda" />
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7" fill="#e8a735" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="375" fill="#fafafa" rx="8" />

  <!-- Title: name-route -->
  <text x="460" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">name-route</text>

  <!-- ===== PROJECT A (Left) ===== -->
  <rect x="15" y="44" width="280" height="132" rx="6" fill="#e8f4fd" stroke="#4a9eda" stroke-width="1.5" />
  <text x="155" y="64" text-anchor="middle" font-weight="bold" fill="#2a7ab8" font-size="13">PROJECT A</text>
  <line x1="30" y1="72" x2="280" y2="72" stroke="#b8d4e8" stroke-width="1" />
  <text x="30" y="97" font-weight="bold" fill="#888" font-size="11">WEB</text>
  <text x="30" y="113" fill="#333" font-size="12">http://<tspan font-weight="bold" fill="#2a7ab8">A</tspan>.localhost:8080</text>
  <text x="30" y="143" font-weight="bold" fill="#888" font-size="11">PostgreSQL</text>
  <text x="30" y="159" fill="#333" font-size="12">psql -h localhost -p 15432 -d <tspan font-weight="bold" fill="#2a7ab8">A</tspan></text>

  <!-- ===== PROJECT B (Left) ===== -->
  <rect x="15" y="198" width="280" height="132" rx="6" fill="#fef3e2" stroke="#e8a735" stroke-width="1.5" />
  <text x="155" y="218" text-anchor="middle" font-weight="bold" fill="#c47f0a" font-size="13">PROJECT B</text>
  <line x1="30" y1="226" x2="280" y2="226" stroke="#e8d5a0" stroke-width="1" />
  <text x="30" y="251" font-weight="bold" fill="#888" font-size="11">WEB</text>
  <text x="30" y="267" fill="#333" font-size="12">http://<tspan font-weight="bold" fill="#c47f0a">B</tspan>.localhost:8080</text>
  <text x="30" y="297" font-weight="bold" fill="#888" font-size="11">PostgreSQL</text>
  <text x="30" y="313" fill="#333" font-size="12">psql -h localhost -p 15432 -d <tspan font-weight="bold" fill="#c47f0a">B</tspan></text>

  <!-- ===== name-route (Center Box) ===== -->
  <rect x="370" y="44" width="180" height="286" rx="8" fill="#f0f0f0" stroke="#555" stroke-width="2" />
  <text x="390" y="71" font-weight="bold" fill="#333" font-size="13">:8080   HTTP</text>
  <text x="390" y="129" font-weight="bold" fill="#333" font-size="13">:8443   HTTPS</text>
  <text x="390" y="187" font-weight="bold" fill="#333" font-size="13">:15432  PostgreSQL</text>
  <text x="390" y="245" font-weight="bold" fill="#333" font-size="13">:13306  MySQL</text>
  <text x="390" y="303" font-weight="bold" fill="#333" font-size="13">:10025  SMTP</text>

  <!-- ===== PROJECT A (Right) ===== -->
  <rect x="640" y="44" width="265" height="132" rx="6" fill="#e8f4fd" stroke="#4a9eda" stroke-width="1.5" />
  <text x="772" y="64" text-anchor="middle" font-weight="bold" fill="#2a7ab8" font-size="13">PROJECT A</text>
  <line x1="655" y1="72" x2="890" y2="72" stroke="#b8d4e8" stroke-width="1" />
  <text x="655" y="97" font-weight="bold" fill="#888" font-size="11">WEB</text>
  <text x="655" y="113" fill="#333" font-size="12">localhost:3000</text>
  <text x="655" y="143" font-weight="bold" fill="#888" font-size="11">PostgreSQL</text>
  <text x="655" y="159" fill="#333" font-size="12">localhost:5432</text>

  <!-- ===== PROJECT B (Right) ===== -->
  <rect x="640" y="198" width="265" height="132" rx="6" fill="#fef3e2" stroke="#e8a735" stroke-width="1.5" />
  <text x="772" y="218" text-anchor="middle" font-weight="bold" fill="#c47f0a" font-size="13">PROJECT B</text>
  <line x1="655" y1="226" x2="890" y2="226" stroke="#e8d5a0" stroke-width="1" />
  <text x="655" y="251" font-weight="bold" fill="#888" font-size="11">WEB</text>
  <text x="655" y="267" fill="#333" font-size="12">localhost:3001</text>
  <text x="655" y="297" font-weight="bold" fill="#888" font-size="11">PostgreSQL</text>
  <text x="655" y="313" fill="#333" font-size="12">localhost:5433</text>

  <!-- ===== Arrows: A Left → Center ===== -->
  <path d="M295,113 C320,113 355,68 370,68" fill="none" stroke="#4a9eda" stroke-width="1.5" marker-end="url(#arr-a)" />
  <path d="M295,159 C320,159 355,184 370,184" fill="none" stroke="#4a9eda" stroke-width="1.5" marker-end="url(#arr-a)" />

  <!-- ===== Arrows: B Left → Center ===== -->
  <path d="M295,267 C320,267 355,74 370,74" fill="none" stroke="#e8a735" stroke-width="1.5" marker-end="url(#arr-b)" />
  <path d="M295,313 C320,313 355,190 370,190" fill="none" stroke="#e8a735" stroke-width="1.5" marker-end="url(#arr-b)" />

  <!-- ===== Arrows: Center → A Right ===== -->
  <path d="M550,68 C575,68 625,113 640,113" fill="none" stroke="#4a9eda" stroke-width="1.5" marker-end="url(#arr-a)" />
  <path d="M550,184 C575,184 625,159 640,159" fill="none" stroke="#4a9eda" stroke-width="1.5" marker-end="url(#arr-a)" />

  <!-- ===== Arrows: Center → B Right ===== -->
  <path d="M550,74 C575,74 625,267 640,267" fill="none" stroke="#e8a735" stroke-width="1.5" marker-end="url(#arr-b)" />
  <path d="M550,190 C575,190 625,313 640,313" fill="none" stroke="#e8a735" stroke-width="1.5" marker-end="url(#arr-b)" />

  <!-- Footer tagline -->
  <text x="460" y="355" text-anchor="middle" font-weight="bold" fill="#555" font-size="13">One port per protocol. Routing by name.</text>
</svg>

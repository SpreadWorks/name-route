name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: nameroute-x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_name: nameroute-aarch64-unknown-linux-musl
          - runner: macos-latest
            target: x86_64-apple-darwin
            binary_name: nameroute-x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
            binary_name: nameroute-aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/nameroute ${{ matrix.binary_name }}

      - name: Smoke test binary
        if: contains(matrix.target, 'linux') || matrix.target == 'aarch64-apple-darwin'
        run: ./${{ matrix.binary_name }} --help

      - name: E2E smoke test binary
        if: contains(matrix.target, 'linux')
        run: |
          TMPCONFIG=$(mktemp /tmp/e2e-XXXXXX.toml)
          cat > "$TMPCONFIG" <<'EOF'
          [general]
          log_level = "info"
          [listeners.http]
          protocol = "http"
          bind = "127.0.0.1:18080"
          [http]
          base_domain = "localhost"
          [docker]
          enabled = false
          EOF
          sed -i 's/^          //' "$TMPCONFIG"
          ./${{ matrix.binary_name }} serve --config "$TMPCONFIG" &
          PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: localhost" http://127.0.0.1:18080/)
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          rm -f "$TMPCONFIG"
          if [ "$STATUS" = "404" ]; then
            echo "PASS: HTTP no subdomain returned 404"
          else
            echo "FAIL: expected 404, got $STATUS"
            exit 1
          fi

      - name: Generate SHA256
        run: shasum -a 256 ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            ${{ matrix.binary_name }}
            ${{ matrix.binary_name }}.sha256

  build-deb:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot musl-tools

      - name: Build deb package
        run: ./packaging/build.sh deb ${{ matrix.target }}

      - name: Test deb install
        run: |
          sudo dpkg -i packaging/out/*.deb
          nameroute --help

      - name: E2E smoke test (deb)
        run: |
          TMPCONFIG=$(mktemp /tmp/e2e-XXXXXX.toml)
          cat > "$TMPCONFIG" <<'EOF'
          [general]
          log_level = "info"
          [listeners.http]
          protocol = "http"
          bind = "127.0.0.1:18080"
          [http]
          base_domain = "localhost"
          [docker]
          enabled = false
          EOF
          sed -i 's/^          //' "$TMPCONFIG"
          nameroute serve --config "$TMPCONFIG" &
          PID=$!
          sleep 2
          # No subdomain should return 404
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: localhost" http://127.0.0.1:18080/)
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          rm -f "$TMPCONFIG"
          if [ "$STATUS" = "404" ]; then
            echo "PASS: HTTP no subdomain returned 404"
          else
            echo "FAIL: expected 404, got $STATUS"
            exit 1
          fi

      - name: Uninstall deb
        run: sudo dpkg -r nameroute

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: packaging/out/*.deb

  build-rpm:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm musl-tools

      - name: Build rpm package
        run: ./packaging/build.sh rpm ${{ matrix.target }}

      - name: Test rpm install
        run: |
          sudo apt-get install -y rpm2cpio cpio
          mkdir -p /tmp/rpm-extract
          cd /tmp/rpm-extract
          rpm2cpio ${{ github.workspace }}/packaging/out/*.rpm | cpio -idmv
          ./usr/bin/nameroute --help

      - name: E2E smoke test (rpm)
        run: |
          TMPCONFIG=$(mktemp /tmp/e2e-XXXXXX.toml)
          cat > "$TMPCONFIG" <<'EOF'
          [general]
          log_level = "info"
          [listeners.http]
          protocol = "http"
          bind = "127.0.0.1:18080"
          [http]
          base_domain = "localhost"
          [docker]
          enabled = false
          EOF
          sed -i 's/^          //' "$TMPCONFIG"
          /tmp/rpm-extract/usr/bin/nameroute serve --config "$TMPCONFIG" &
          PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: localhost" http://127.0.0.1:18080/)
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          rm -f "$TMPCONFIG"
          if [ "$STATUS" = "404" ]; then
            echo "PASS: HTTP no subdomain returned 404"
          else
            echo "FAIL: expected 404, got $STATUS"
            exit 1
          fi

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: packaging/out/*.rpm

  release:
    needs: [build-binaries, build-deb, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          # Binaries and their individual SHA256 files
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl x86_64-apple-darwin aarch64-apple-darwin; do
            cp "artifacts/nameroute-${target}/nameroute-${target}" release/
          done
          # Deb packages (versioned + version-less for latest URL)
          for f in artifacts/deb-*/*.deb; do
            cp "$f" release/
            arch=$(basename "$f" | grep -oP '(amd64|arm64)' | head -1)
            cp "$f" "release/nameroute_${arch}.deb"
          done
          # RPM packages (versioned + version-less for latest URL)
          for f in artifacts/rpm-*/*.rpm; do
            cp "$f" release/
            arch=$(basename "$f" | grep -oP '(x86_64|aarch64)' | head -1)
            cp "$f" "release/nameroute-${arch}.rpm"
          done
          # Generate combined SHA256SUMS
          cd release
          shasum -a 256 * > SHA256SUMS

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: true
          generate_release_notes: true

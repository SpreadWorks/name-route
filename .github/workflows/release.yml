name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: nameroute-x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: nameroute-aarch64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
            binary_name: nameroute-x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
            binary_name: nameroute-aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/nameroute ${{ matrix.binary_name }}

      - name: Generate SHA256
        run: shasum -a 256 ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            ${{ matrix.binary_name }}
            ${{ matrix.binary_name }}.sha256

  build-deb:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Build deb package
        run: ./packaging/build.sh deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: packaging/out/*.deb

  build-rpm:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build rpm package
        run: ./packaging/build.sh rpm

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: packaging/out/*.rpm

  release:
    needs: [build-binaries, build-deb, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          # Binaries and their individual SHA256 files
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            cp "artifacts/nameroute-${target}/nameroute-${target}" release/
          done
          # Deb packages
          cp artifacts/deb-*/*.deb release/
          # RPM packages
          cp artifacts/rpm-*/*.rpm release/
          # Generate combined SHA256SUMS
          cd release
          shasum -a 256 * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download binary artifacts for SHA256
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Homebrew formula
        run: |
          SHA256_MACOS_ARM64=$(awk '{print $1}' artifacts/nameroute-aarch64-apple-darwin/nameroute-aarch64-apple-darwin.sha256)
          SHA256_MACOS_X86_64=$(awk '{print $1}' artifacts/nameroute-x86_64-apple-darwin/nameroute-x86_64-apple-darwin.sha256)
          SHA256_LINUX_ARM64=$(awk '{print $1}' artifacts/nameroute-aarch64-unknown-linux-gnu/nameroute-aarch64-unknown-linux-gnu.sha256)
          SHA256_LINUX_X86_64=$(awk '{print $1}' artifacts/nameroute-x86_64-unknown-linux-gnu/nameroute-x86_64-unknown-linux-gnu.sha256)

          sed \
            -e "s/%%VERSION%%/${{ steps.version.outputs.version }}/g" \
            -e "s/%%SHA256_MACOS_ARM64%%/${SHA256_MACOS_ARM64}/g" \
            -e "s/%%SHA256_MACOS_X86_64%%/${SHA256_MACOS_X86_64}/g" \
            -e "s/%%SHA256_LINUX_ARM64%%/${SHA256_LINUX_ARM64}/g" \
            -e "s/%%SHA256_LINUX_X86_64%%/${SHA256_LINUX_X86_64}/g" \
            packaging/homebrew/nameroute.rb.tmpl > nameroute.rb

      - name: Push to Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/SpreadWorks/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp nameroute.rb tap/Formula/nameroute.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nameroute.rb
          git commit -m "Update nameroute to ${{ steps.version.outputs.version }}"
          git push

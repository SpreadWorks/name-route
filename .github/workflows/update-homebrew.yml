name: Update Homebrew

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256SUMS from release
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "SHA256SUMS" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Homebrew formula
        run: |
          SHA256_MACOS_ARM64=$(grep 'nameroute-aarch64-apple-darwin$' SHA256SUMS | awk '{print $1}')
          SHA256_MACOS_X86_64=$(grep 'nameroute-x86_64-apple-darwin$' SHA256SUMS | awk '{print $1}')
          SHA256_LINUX_ARM64=$(grep 'nameroute-aarch64-unknown-linux-musl$' SHA256SUMS | awk '{print $1}')
          SHA256_LINUX_X86_64=$(grep 'nameroute-x86_64-unknown-linux-musl$' SHA256SUMS | awk '{print $1}')

          sed \
            -e "s/%%VERSION%%/${{ steps.version.outputs.version }}/g" \
            -e "s/%%SHA256_MACOS_ARM64%%/${SHA256_MACOS_ARM64}/g" \
            -e "s/%%SHA256_MACOS_X86_64%%/${SHA256_MACOS_X86_64}/g" \
            -e "s/%%SHA256_LINUX_ARM64%%/${SHA256_LINUX_ARM64}/g" \
            -e "s/%%SHA256_LINUX_X86_64%%/${SHA256_LINUX_X86_64}/g" \
            packaging/homebrew/nameroute.rb.tmpl > nameroute.rb

      - name: Push to Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/SpreadWorks/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp nameroute.rb tap/Formula/nameroute.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nameroute.rb
          if git diff --cached --quiet; then
            echo "No changes to Homebrew formula, skipping push"
          else
            git commit -m "Update nameroute to ${{ steps.version.outputs.version }}"
            git push
          fi
